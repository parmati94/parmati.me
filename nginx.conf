user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;

    server {
        listen 80;
        listen [::]:80;
        server_name _;
        root /usr/share/nginx/html;

        # Hashed Vite build assets — fingerprinted, so cache hard & immutable.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Live content (resume.pdf, projects.json, photos): the /content volume
        # mount wins; the defaults baked into the image are the fallback, so the
        # container works with no volume at all. no-cache = revalidate every
        # request, so dropping a new file into ./content shows up on refresh.
        location /content/ {
            root /;
            try_files $uri @baked;
            add_header Cache-Control "no-cache";
        }
        location @baked {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache";
        }

        # Clean URL for the resume page.
        location = /resume {
            try_files /resume.html =404;
        }

        # Static multi-page site — no SPA fallback.
        location / {
            try_files $uri $uri/ =404;
        }

        # Container health check.
        location = /healthz {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
