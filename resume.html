{{> head }}
{{> header }}

<main id="resume-root" class="container mx-auto w-full max-w-4xl flex-1 px-4 py-10">
  <div class="mb-6 flex flex-wrap items-center gap-3">
    <h1 class="text-3xl font-bold tracking-tight">Resume</h1>

    <!-- web/pdf pill — only when the native data exists -->
    <div
      x-show="resume"
      x-cloak
      class="flex rounded-full border border-line p-0.5 font-mono text-xs"
      role="tablist"
      aria-label="Resume view"
    >
      <button
        type="button"
        role="tab"
        :aria-selected="resumeView === 'web'"
        @click="setResumeView('web')"
        class="rounded-full px-3 py-1 transition-colors"
        :class="resumeView === 'web' ? 'bg-accent font-medium text-bg' : 'text-muted hover:text-ink'"
      >
        web
      </button>
      <button
        type="button"
        role="tab"
        :aria-selected="resumeView === 'pdf'"
        @click="setResumeView('pdf')"
        class="rounded-full px-3 py-1 transition-colors"
        :class="resumeView === 'pdf' ? 'bg-accent font-medium text-bg' : 'text-muted hover:text-ink'"
      >
        pdf
      </button>
    </div>

    <a
      href="/content/resume.pdf"
      download="paul-armati-resume.pdf"
      class="ml-auto rounded-lg bg-accent px-4 py-2 font-mono text-sm font-medium text-bg transition-opacity hover:opacity-90"
      >download pdf</a
    >
  </div>

  <!-- ============ Native view ============ -->
  <article
    x-show="resume && resumeView === 'web'"
    x-cloak
    class="rounded-xl border border-line bg-surface p-6 sm:p-10"
  >
    <header class="border-b border-line pb-6 text-center">
      <h2 class="text-3xl font-bold tracking-tight" x-text="resume?.name"></h2>
      <ul class="mt-3 flex flex-wrap justify-center gap-x-2 text-sm text-muted">
        <template x-for="(c, i) in resume?.contacts || []" :key="i">
          <li class="[&_a]:text-accent [&_a]:hover:underline">
            <span x-show="i > 0" class="mr-2 select-none" aria-hidden="true">&middot;</span
            ><span x-html="c"></span>
          </li>
        </template>
      </ul>
    </header>

    <template x-for="section in resume?.sections || []" :key="section.title">
      <section class="mt-8">
        <h3
          class="font-mono text-xs font-medium uppercase tracking-widest text-accent"
          x-text="section.title"
        ></h3>
        <template x-for="(entry, ei) in section.entries" :key="ei">
          <div class="mt-4 first-of-type:mt-3">
            <div
              x-show="resumeEntryHasHeading(entry)"
              class="flex flex-wrap items-baseline gap-x-3 gap-y-0.5"
            >
              <span class="font-semibold" x-text="entry.left"></span>
              <span class="text-sm text-muted" x-text="entry.center"></span>
              <span class="ml-auto font-mono text-xs text-muted" x-text="entry.right"></span>
            </div>
            <ul
              class="mt-2 list-disc space-y-1.5 pl-5 text-sm leading-relaxed text-muted [&_a]:text-accent [&_a]:hover:underline [&_b]:text-ink"
            >
              <template x-for="(b, bi) in entry.bullets" :key="bi">
                <li x-html="b"></li>
              </template>
            </ul>
          </div>
        </template>
      </section>
    </template>

    <footer
      x-show="resume?.sourceCommit"
      class="mt-10 border-t border-line pt-4 text-center font-mono text-[11px] text-muted"
    >
      generated from source <span x-text="resume?.sourceCommit?.slice(0, 10)"></span>
      &middot; <span x-text="resume?.generatedAt?.slice(0, 10)"></span>
    </footer>
  </article>

  <!-- ============ PDF view (and no-JSON fallback) ============ -->
  <!-- Inline viewer; most mobile browsers won't embed PDFs, hence the fallback. -->
  <object
    x-show="!resume || resumeView === 'pdf'"
    data="/content/resume.pdf"
    type="application/pdf"
    class="h-[75vh] w-full rounded-xl border border-line bg-surface"
  >
    <div class="grid h-full place-items-center p-8 text-center text-muted">
      <p>
        Your browser doesn't display PDFs inline —
        <a href="/content/resume.pdf" class="text-accent underline">open the resume directly</a>.
      </p>
    </div>
  </object>
</main>

{{> footer }}
