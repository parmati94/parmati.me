<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <meta name="description" content="{{description}}" />
    <link rel="canonical" href="{{canonical}}" />
    <meta property="og:title" content="{{title}}" />
    <meta property="og:description" content="{{description}}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{canonical}}" />
    <meta property="og:image" content="https://parmati.me/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#0e141b" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <!-- Theme guard: set .dark before first paint (stored choice, else system). -->
    <script>
      (function () {
        var stored = null;
        try {
          stored = localStorage.getItem('pm-theme');
        } catch (e) {}
        var dark = stored
          ? stored === 'dark'
          : !window.matchMedia('(prefers-color-scheme: light)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    {{#if isHome}}
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Paul",
        "url": "https://parmati.me/",
        "sameAs": ["https://github.com/parmati94"]
      }
    </script>
    {{/if}}
    <script type="module" src="/js/app.js"></script>
  </head>
