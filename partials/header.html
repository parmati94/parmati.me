<header class="sticky top-0 z-50 border-b border-line bg-bg/85 backdrop-blur">
  <nav class="container mx-auto flex max-w-5xl items-center gap-5 px-4 py-3 font-mono text-sm">
    <a href="/" class="flex items-center gap-2 font-medium text-ink">
      <span class="led led-on" aria-hidden="true"></span>
      parmati.me
    </a>
    <div class="ml-auto flex items-center gap-4 sm:gap-5">
      <a href="/#projects" class="text-muted transition-colors hover:text-ink">projects</a>
      <a href="/resume" class="text-muted transition-colors hover:text-ink">resume</a>
      <a
        href="https://github.com/parmati94"
        target="_blank"
        rel="noopener"
        class="hidden text-muted transition-colors hover:text-ink sm:inline"
        >github&nbsp;&#8599;</a
      >
      <button
        type="button"
        @click="toggleTheme()"
        class="rounded-md border border-line p-1.5 text-muted transition-colors hover:border-accent/60 hover:text-ink"
        :aria-label="mode === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
      >
        <!-- sun (shown in dark mode → click for light) -->
        <svg
          x-cloak
          x-show="mode === 'dark'"
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4"
          />
        </svg>
        <!-- moon (shown in light mode → click for dark) -->
        <svg
          x-cloak
          x-show="mode === 'light'"
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
        </svg>
        <noscript><span class="text-xs">theme</span></noscript>
      </button>
    </div>
  </nav>
</header>
